<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slide 7 — Traction</title>
<style>
  /* ============================================================
     SLIDE 7 — TRACTION (v1)
     Single horizontal row of four hero stats. Logo row beneath.
     Stat order (left to right): pipeline, deployments, DARPA, raised.
     <$4M is the rhetorical payload — Prometheus accent.
     No closer line (cut per Jack 2026-04-26).
     ============================================================ */

  @font-face {
    font-family: 'DIN Pro';
    src: url('assets/fonts/DINPro-Light.ttf') format('truetype');
    font-weight: 300;
  }
  @font-face {
    font-family: 'DIN Pro';
    src: url('assets/fonts/DINPro-Medium.ttf') format('truetype');
    font-weight: 500;
  }

  :root {
    --prometheus: #D91C5C;
    --aquarius: #26A9E0;
    --bg-charcoal: #1A1A1A;
    --pure-white: #FFFFFF;
    --off-white: #F0F0F0;
    --body-white: #E8E8E8;
    --label-grey: rgba(240, 240, 240, 0.55);
    --body-grey: rgba(240, 240, 240, 0.85);
    --rule-grey: rgba(240, 240, 240, 0.18);
    --source-grey: rgba(240, 240, 240, 0.40);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'DIN Pro', 'Helvetica Neue', sans-serif;
  }

  .slide {
    position: relative;
    width: 100vw;
    height: 56.25vw;
    max-height: 100vh;
    max-width: 177.78vh;
    margin: 0 auto;
    overflow: hidden;
    background-color: var(--bg-charcoal);
    padding: 4% 7% 2.5% 7%;
    display: flex;
    flex-direction: column;
  }

  /* ===== TEMPLATE: HEADER ===== */
  .top-strip {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3.5vh;
    flex-shrink: 0;
  }

  .top-strip .header-logo {
    height: 4.0vw;
    max-height: 64px;
    width: auto;
  }

  .top-strip .section-label {
    font-family: 'DIN Pro', sans-serif;
    font-weight: 500;
    font-size: clamp(16px, 1.5vw, 22px);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--pure-white);
  }

  /* ===== TEMPLATE: HEADLINE ===== */
  .headline-block {
    text-align: center;
    margin-bottom: 2.5vh;
    flex-shrink: 0;
  }

  .slide-headline {
    font-family: 'DIN Pro', sans-serif;
    font-weight: 500;
    font-size: clamp(30px, 3.0vw, 48px);
    color: var(--pure-white);
    line-height: 1.2;
    letter-spacing: -0.005em;
    max-width: 96%;
    margin: 0 auto;
  }

  .top-rule {
    height: 3px;
    background: linear-gradient(to right, var(--prometheus), var(--aquarius));
    margin: 0 0 5vh;
    flex-shrink: 0;
  }

  /* ===== BODY ===== */
  .body {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* ===== STAT ROW (4 across) ===== */
  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 0;
    margin-top: 8vh;
    /* default align-items: stretch — every cell takes full row height */
  }

  .stat-cell {
    text-align: center;
    padding: 0;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start; /* top-aligns numbers across all cells */
  }

  /* Vertical hairlines between stat cells */
  .stat-cell:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 18%;
    bottom: 18%;
    width: 1px;
    background: var(--rule-grey);
  }

  .stat-number {
    font-family: 'DIN Pro', sans-serif;
    font-weight: 500;
    font-size: clamp(64px, 6.4vw, 116px);
    color: var(--pure-white);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 2.3vh;
    /* Trim line-box to cap-height so glyphs without ascenders (e.g. "10+")
       top-align with glyphs that have ascenders (e.g. ">$110M"). */
    text-box: trim-both cap alphabetic;
  }

  .stat-cell--punchline .stat-number {
    color: var(--prometheus);
  }

  /* "10+" lacks ascender-extending glyphs (no $, <, or >) so the cap-height
     of its digits sits ~12px below the others. Lift the number to compensate. */
  .stat-cell--lift .stat-number {
    transform: translateY(-12px);
  }

  .stat-caption {
    font-family: 'DIN Pro', sans-serif;
    font-weight: 500;
    font-size: clamp(15px, 1.3vw, 19px);
    color: var(--off-white);
    line-height: 1.3;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ===== LOGO ROW ===== */
  .logo-row-section {
    flex-shrink: 0;
    margin-top: 16vh;       /* fixed gap above logos — they float up toward the stats */
    margin-bottom: 6vh;
  }

  .logo-row-label {
    font-family: 'DIN Pro', sans-serif;
    font-weight: 500;
    font-size: clamp(17px, 1.5vw, 22px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--pure-white);
    margin-bottom: 3.2vh;
    text-align: center;
  }

  .logo-row {
    display: flex;
    flex-wrap: nowrap;
    align-items: center;
    justify-content: space-between;
    gap: 1.2vw;
  }

  .logo-placeholder {
    flex: 1 1 0;
    height: 5.5vh;
    min-height: 44px;
    max-height: 64px;
    /* Semi-transparent white pill — matches Slide 4 customer-logo
       treatment. ~28% charcoal bleed-through, soft 8px corners,
       tighter padding. */
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 8px;
    padding: 4px 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .logo-placeholder img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }

  /* ===== TEMPLATE: FOOTER ===== */
  .footer {
    padding-top: 1.6vh;
    border-top: 1px solid var(--rule-grey);
    flex-shrink: 0;
  }

  .footer-text {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'DIN Pro', sans-serif;
    font-weight: 500;
    font-size: clamp(14px, 1.15vw, 18px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--off-white);
  }

  .footer-text .pipe {
    display: inline-block;
    margin: 0 0.7em;
    color: rgba(240, 240, 240, 0.4);
  }

  @media print {
    @page { size: 1920px 1080px; margin: 0; }
    html, body { width: 1920px; height: 1080px; }
    .slide { width: 1920px; height: 1080px; max-width: none; max-height: none; }
  }
</style>
</head>
<body>

<div class="slide">

  <!-- HEADER -->
  <div class="top-strip">
    <img src="assets/img/UB_Horisontal_Color.png" alt="Unicorn" class="header-logo">
    <span class="section-label">Traction</span>
  </div>

  <!-- HEADLINE: four compressed facts, periods between -->
  <div class="headline-block">
    <h1 class="slide-headline">Most data factories burn capital. Ours generates it.</h1>
  </div>

  <div class="top-rule"></div>

  <!-- BODY -->
  <div class="body">

    <!-- Four hero stats (pipeline, deployments, DARPA, raised) -->
    <div class="stat-row">

      <div class="stat-cell">
        <div class="stat-number">&gt;$106M</div>
        <div class="stat-caption">
          Gross pipeline
        </div>
      </div>

      <div class="stat-cell">
        <div class="stat-number">&gt;$15M</div>
        <div class="stat-caption">
          Late-stage pipeline
        </div>
      </div>

      <div class="stat-cell">
        <div class="stat-number">&gt;$3.5M</div>
        <div class="stat-caption">
          Contracts won
        </div>
      </div>

      <div class="stat-cell stat-cell--punchline">
        <div class="stat-number">&lt;$4M</div>
        <div class="stat-caption">
          Capital raised
        </div>
      </div>

    </div>

    <!-- Logo row (mirrors Slide 4) — pushed to the bottom of the body via auto margin -->
    <div class="logo-row-section">
      <div class="logo-row-label">Our customers</div>
      <div class="logo-row">
        <div class="logo-placeholder"><img src="assets/img/logos/logo_astrazeneca_framed.png" alt="AstraZeneca"></div>
        <div class="logo-placeholder"><img src="assets/img/logos/logo_bayer_transp.png" alt="Bayer"></div>
        <div class="logo-placeholder"><img src="assets/img/logos/logo_ginkgo.png" alt="Ginkgo Bioworks"></div>
        <div class="logo-placeholder"><img src="assets/img/logos/logo_uppsala_transp.png" alt="University of Uppsala"></div>
        <div class="logo-placeholder"><img src="assets/img/logos/logo_sheffield.png" alt="University of Sheffield"></div>
        <div class="logo-placeholder"><img src="assets/img/logos/logo_darpa.png" alt="DARPA"></div>
        <div class="logo-placeholder"><img src="assets/img/logos/logo_ukri_transp.png" alt="UKRI"></div>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-text">
      <span>Unicorn Biotechnologies<span class="pipe">|</span>Investor Deck 2026</span>
      <span>07 / 13</span>
    </div>
  </div>

</div>

</body>
</html>
