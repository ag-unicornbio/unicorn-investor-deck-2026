<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slide 13 — Closer</title>
<style>
  /* ============================================================
     SLIDE 13 — CLOSER
     Mirror of Slide 1.
     - Same atmospheric split composition + cinematic dissolve
     - Same Unicorn Light tagline treatment
     - Same Borealis gradient accent above tagline
     - Tagline: "the data foundry for biology" (matches Slide 1 —
       deliberate bookend; opens declaring frame, closes restating)
     - Contact: Jack Reid below tagline
     ============================================================ */

  @font-face {
    font-family: 'Unicorn';
    src: url('assets/fonts/Unicorn-Light.otf') format('opentype');
    font-weight: 300;
  }
  @font-face {
    font-family: 'Unicorn';
    src: url('assets/fonts/Unicorn-Medium.otf') format('opentype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'DIN Pro';
    src: url('assets/fonts/DINPro-Light.ttf') format('truetype');
    font-weight: 300;
  }
  @font-face {
    font-family: 'DIN Pro';
    src: url('assets/fonts/DINPro-Medium.ttf') format('truetype');
    font-weight: 500;
  }

  :root {
    --prometheus: #D91C5C;
    --aquarius: #26A9E0;
    --true-black: #0A0A0A;
    --pure-white: #FFFFFF;
    --off-white: #F0F0F0;
    --metadata-grey: rgba(240, 240, 240, 0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  .slide {
    position: relative;
    width: 100vw;
    height: 56.25vw;
    max-height: 100vh;
    max-width: 177.78vh;
    margin: 0 auto;
    overflow: hidden;
    background-color: var(--true-black);
  }

  /* Atmospheric pane — same as Slide 1 */
  .atmospheric {
    position: absolute;
    top: 0;
    right: 0;
    width: 65%;
    height: 100%;
    background-image: url('assets/img/organic33.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    -webkit-mask-image: linear-gradient(
      to right,
      rgba(0, 0, 0, 0) 0%,
      rgba(0, 0, 0, 0.01) 4%,
      rgba(0, 0, 0, 0.05) 8%,
      rgba(0, 0, 0, 0.10) 12%,
      rgba(0, 0, 0, 0.18) 16%,
      rgba(0, 0, 0, 0.26) 20%,
      rgba(0, 0, 0, 0.35) 24%,
      rgba(0, 0, 0, 0.45) 28%,
      rgba(0, 0, 0, 0.55) 32%,
      rgba(0, 0, 0, 0.65) 36%,
      rgba(0, 0, 0, 0.74) 40%,
      rgba(0, 0, 0, 0.82) 44%,
      rgba(0, 0, 0, 0.90) 48%,
      rgba(0, 0, 0, 0.95) 52%,
      rgba(0, 0, 0, 0.99) 56%,
      rgba(0, 0, 0, 1) 60%,
      black 100%
    );
    mask-image: linear-gradient(
      to right,
      rgba(0, 0, 0, 0) 0%,
      rgba(0, 0, 0, 0.01) 4%,
      rgba(0, 0, 0, 0.05) 8%,
      rgba(0, 0, 0, 0.10) 12%,
      rgba(0, 0, 0, 0.18) 16%,
      rgba(0, 0, 0, 0.26) 20%,
      rgba(0, 0, 0, 0.35) 24%,
      rgba(0, 0, 0, 0.45) 28%,
      rgba(0, 0, 0, 0.55) 32%,
      rgba(0, 0, 0, 0.65) 36%,
      rgba(0, 0, 0, 0.74) 40%,
      rgba(0, 0, 0, 0.82) 44%,
      rgba(0, 0, 0, 0.90) 48%,
      rgba(0, 0, 0, 0.95) 52%,
      rgba(0, 0, 0, 0.99) 56%,
      rgba(0, 0, 0, 1) 60%,
      black 100%
    );
  }

  .atmospheric::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(0, 0, 0, 0.3) 0%,
      rgba(0, 0, 0, 0.1) 30%,
      rgba(0, 0, 0, 0.0) 60%,
      rgba(0, 0, 0, 0.15) 100%
    );
    pointer-events: none;
  }

  /* Logo top-left — same as Slide 1 */
  .logo {
    position: absolute;
    top: 5.5%;
    left: 5%;
    width: 22%;
    max-width: 340px;
    height: auto;
    z-index: 3;
  }

  .logo img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Tagline — Unicorn Light, mirrors Slide 1 exactly.
     Same line: "the data foundry for biology" */
  .tagline {
    position: absolute;
    top: 50%;
    left: 5%;
    transform: translateY(-55%);
    width: 50%;
    z-index: 3;

    font-family: 'Unicorn', 'DIN Pro', 'Helvetica Neue', sans-serif;
    font-weight: 500;
    font-size: clamp(32px, 4.0vw, 72px);
    line-height: 1.05;
    letter-spacing: 0;
    color: var(--pure-white);
  }

  .tagline::before {
    content: '';
    display: block;
    width: 60%;
    max-width: 480px;
    height: 2px;
    background: linear-gradient(to right, var(--prometheus), var(--aquarius));
    margin-bottom: 28px;
  }

  /* Contact info — sits below the tagline */
  .contact {
    position: absolute;
    top: calc(50% + 16vh);
    left: 5%;
    z-index: 3;

    font-family: 'DIN Pro', 'Helvetica Neue', sans-serif;
    font-weight: 300;
    font-size: clamp(15px, 1.4vw, 22px);
    line-height: 1.6;
    color: var(--off-white);
    letter-spacing: 0.02em;
  }

  .contact .contact-name {
    font-weight: 500;
    color: var(--pure-white);
    margin-bottom: 0.6vh;
    display: block;
    letter-spacing: 0.02em;
  }

  .contact .contact-line {
    display: block;
  }

  .contact a {
    color: inherit;
    text-decoration: none;
  }

  /* Bottom-left metadata — mirrors Slide 1 */
  .metadata {
    position: absolute;
    bottom: 5%;
    z-index: 3;

    font-family: 'DIN Pro', 'Helvetica Neue', sans-serif;
    font-weight: 500;
    font-size: clamp(13px, 1.35vw, 22px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--off-white);
    line-height: 1.5;
  }

  .metadata--left {
    left: 5%;
  }

  .metadata .pipe {
    display: inline-block;
    margin: 0 0.7em;
    color: rgba(240, 240, 240, 0.5);
  }

  @media print {
    @page { size: 1920px 1080px; margin: 0; }
    html, body { width: 1920px; height: 1080px; }
    .slide { width: 1920px; height: 1080px; max-width: none; max-height: none; }
  }
</style>
</head>
<body>

<div class="slide">

  <div class="atmospheric"></div>

  <div class="logo">
    <img src="assets/img/UB_Horisontal_Color.png" alt="Unicorn Biotechnologies">
  </div>

  <!-- Tagline mirrors Slide 1: "the data foundry for biology" -->
  <div class="tagline">
    the data factory<br>for biology
  </div>

  <!-- Contact: presenter placeholder (Adam or Jack — fill before sending) -->
  <div class="contact">
    <span class="contact-name">[Adam Glen]</span>
    <span class="contact-line">[adam.glen@unicornb.io]</span>
    <span class="contact-line"><a href="https://www.unicornb.io">www.unicornb.io</a></span>
  </div>

  <div class="metadata metadata--left">
    Unicorn Biotechnologies<span class="pipe">|</span>Investor Deck 2026
  </div>

</div>

</body>
</html>
